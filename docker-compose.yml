version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - edgenvr-data:/data
      - /dev:/dev
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - RECORDINGS_PATH=/data/recordings
      - EVENTS_PATH=/data/events
      - DATABASE_PATH=/data/edgenvr.db
      - DETECTION_THRESHOLD=0.5
      - DETECTION_INTERVAL=5
    restart: unless-stopped
    privileged: true

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080
    restart: unless-stopped

volumes:
  edgenvr-data:

networks:
  default:
    name: edgenvr-network
